name: Release plugin

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack plugin
        run: |
          mkdir -p dist
          npx streamdeck pack ./com.bknadir.streamboard.sdPlugin \
            --output ./dist \
            --force \
            --version "${GITHUB_REF_NAME#v}" \
            --no-update-check

      - name: Create source zip
        run: |
          zip -r ./dist/streamboard-${GITHUB_REF_NAME}.zip . \
            -x ".git/*" ".github/*" "node_modules/*" "dist/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/*.streamDeckPlugin
            ./dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}