name: Release plugin

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare artifact
        run: |
          mkdir -p dist
          zip -r dist/streamboard-${GITHUB_REF_NAME}.zip com.bknadir.streamboard.streamDeckPlugin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/streamboard-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}